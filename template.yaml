AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31

Description: CloudDelivery — Real-Time Food Delivery Matching System (CS218 Final Project)

Parameters:
  Env:
    Type: String
    AllowedValues: [dev, prod]
    Default: dev

Globals:
  Function:
    Runtime: python3.12
    Timeout: 30
    MemorySize: 256
    Tracing: Active
    VpcConfig:
      SecurityGroupIds:
        - sg-026d9252cc3d23c4c   # clouddelivery-lambda-sg-dev
      SubnetIds:
        - subnet-01aa0eef94fb322ea  # us-east-1a
        - subnet-023eec997ff73d783  # us-east-1b
    Environment:
      Variables:
        ENV: !Ref Env
        LOG_LEVEL: INFO
        ORDERS_TABLE: !Sub clouddelivery-${Env}
        REDIS_HOST: clouddelivery-redis-dev.ieuoys.ng.0001.use1.cache.amazonaws.com
        REDIS_PORT: "6379"

Resources:

  # ── DynamoDB Single Table ──────────────────────────────────
  OrdersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub clouddelivery-${Env}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: GSI1PK
          AttributeType: S
        - AttributeName: GSI1SK
          AttributeType: S
        - AttributeName: GSI2PK
          AttributeType: S
        - AttributeName: GSI2SK
          AttributeType: S
        - AttributeName: GSI3PK
          AttributeType: S
        - AttributeName: GSI3SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: GSI1-CustomerOrders
          KeySchema:
            - AttributeName: GSI1PK
              KeyType: HASH
            - AttributeName: GSI1SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: GSI2-RestaurantOrders
          KeySchema:
            - AttributeName: GSI2PK
              KeyType: HASH
            - AttributeName: GSI2SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: GSI3-CourierStatus
          KeySchema:
            - AttributeName: GSI3PK
              KeyType: HASH
            - AttributeName: GSI3SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

  # ── Kinesis Streams ────────────────────────────────────────
  OrderStream:
    Type: AWS::Kinesis::Stream
    Properties:
      Name: !Sub clouddelivery-orders-${Env}
      ShardCount: 1
      RetentionPeriodHours: 24

  LocationStream:
    Type: AWS::Kinesis::Stream
    Properties:
      Name: !Sub clouddelivery-locations-${Env}
      ShardCount: 1
      RetentionPeriodHours: 24

  # ── SNS Topic ─────────────────────────────────────────────
  MatchTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub clouddelivery-match-notifications-${Env}

  # ── SQS Queues ────────────────────────────────────────────
  NotificationDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub clouddelivery-notifications-dlq-${Env}
      MessageRetentionPeriod: 1209600  # 14 days

  NotificationQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub clouddelivery-notifications-${Env}
      VisibilityTimeout: 30
      ReceiveMessageWaitTimeSeconds: 20
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt NotificationDLQ.Arn
        maxReceiveCount: 3

  NotificationQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref NotificationQueue
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal:
              Service: sns.amazonaws.com
            Action: sqs:SendMessage
            Resource: !GetAtt NotificationQueue.Arn
            Condition:
              ArnEquals:
                aws:SourceArn: !Ref MatchTopic

  MatchTopicSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref MatchTopic
      Protocol: sqs
      Endpoint: !GetAtt NotificationQueue.Arn

  # ── Cognito User Pool ─────────────────────────────────────
  CognitoUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub clouddelivery-users-${Env}
      AutoVerifiedAttributes:
        - email
      UsernameAttributes:
        - email

  CognitoUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub clouddelivery-client-${Env}
      UserPoolId: !Ref CognitoUserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH

  CourierGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: couriers
      UserPoolId: !Ref CognitoUserPool

  CustomerGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: customers
      UserPoolId: !Ref CognitoUserPool

  RestaurantGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: restaurants
      UserPoolId: !Ref CognitoUserPool

  # ── API Gateway ───────────────────────────────────────────
  CloudDeliveryAPI:
    Type: AWS::Serverless::Api
    Properties:
      Name: !Sub clouddelivery-api-${Env}
      StageName: !Ref Env
      Auth:
        DefaultAuthorizer: CognitoAuthorizer
        Authorizers:
          CognitoAuthorizer:
            UserPoolArn: !GetAtt CognitoUserPool.Arn
        AddDefaultAuthorizerToCorsPreflight: false

  # ── Lambda Functions ──────────────────────────────────────
  OrderAPILambda:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub clouddelivery-order-api-${Env}
      CodeUri: lambdas/
      Handler: order_api.handler.lambda_handler
      Environment:
        Variables:
          ORDER_STREAM_NAME: !Ref OrderStream
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref OrdersTable
        - KinesisCrudPolicy:
            StreamName: !Ref OrderStream
      Events:
        PostOrder:
          Type: Api
          Properties:
            RestApiId: !Ref CloudDeliveryAPI
            Path: /orders
            Method: POST
        GetOrder:
          Type: Api
          Properties:
            RestApiId: !Ref CloudDeliveryAPI
            Path: /orders/{orderId}
            Method: GET
        DeleteOrder:
          Type: Api
          Properties:
            RestApiId: !Ref CloudDeliveryAPI
            Path: /orders/{orderId}
            Method: DELETE
        HealthCheck:
          Type: Api
          Properties:
            RestApiId: !Ref CloudDeliveryAPI
            Path: /health
            Method: GET
            Auth:
              Authorizer: NONE

  CourierAPILambda:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub clouddelivery-courier-api-${Env}
      CodeUri: lambdas/
      Handler: courier_api.handler.lambda_handler
      Environment:
        Variables:
          LOCATION_STREAM_NAME: !Ref LocationStream
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref OrdersTable
        - KinesisCrudPolicy:
            StreamName: !Ref LocationStream
      Events:
        PutLocation:
          Type: Api
          Properties:
            RestApiId: !Ref CloudDeliveryAPI
            Path: /couriers/{courierId}/location
            Method: PUT
        GetAssignment:
          Type: Api
          Properties:
            RestApiId: !Ref CloudDeliveryAPI
            Path: /couriers/{courierId}/assignment
            Method: GET
        AcceptAssignment:
          Type: Api
          Properties:
            RestApiId: !Ref CloudDeliveryAPI
            Path: /couriers/{courierId}/assignment/accept
            Method: PUT
        RejectAssignment:
          Type: Api
          Properties:
            RestApiId: !Ref CloudDeliveryAPI
            Path: /couriers/{courierId}/assignment/reject
            Method: PUT
        UpdateDeliveryStatus:
          Type: Api
          Properties:
            RestApiId: !Ref CloudDeliveryAPI
            Path: /couriers/{courierId}/assignment/status
            Method: PUT

  MatchingLambda:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub clouddelivery-matching-${Env}
      CodeUri: lambdas/
      Handler: matching.handler.lambda_handler
      Environment:
        Variables:
          SEARCH_RADIUS_KM: "5"
          MAX_COURIER_CANDIDATES: "10"
          MATCH_TOPIC_ARN: !Ref MatchTopic
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref OrdersTable
        - SNSPublishMessagePolicy:
            TopicName: !GetAtt MatchTopic.TopicName
        - KinesisStreamReadPolicy:
            StreamName: !Ref OrderStream
      Events:
        KinesisOrderStream:
          Type: Kinesis
          Properties:
            Stream: !GetAtt OrderStream.Arn
            StartingPosition: LATEST
            BatchSize: 1
            BisectBatchOnFunctionError: true
            FunctionResponseTypes:
              - ReportBatchItemFailures

  LocationLambda:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub clouddelivery-location-${Env}
      CodeUri: lambdas/
      Handler: location.handler.lambda_handler
      Environment:
        Variables:
          LOCATION_TTL_SECONDS: "30"
      Policies:
        - KinesisStreamReadPolicy:
            StreamName: !Ref LocationStream
      Events:
        KinesisLocationStream:
          Type: Kinesis
          Properties:
            Stream: !GetAtt LocationStream.Arn
            StartingPosition: LATEST
            BatchSize: 10
            BisectBatchOnFunctionError: true
            FunctionResponseTypes:
              - ReportBatchItemFailures

  NotificationLambda:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub clouddelivery-notification-${Env}
      CodeUri: lambdas/
      Handler: notification.handler.lambda_handler
      Environment:
        Variables:
          NOTIFICATION_QUEUE_URL: !Ref NotificationQueue
      Policies:
        - SQSPollerPolicy:
            QueueName: !GetAtt NotificationQueue.QueueName
        - DynamoDBReadPolicy:
            TableName: !Ref OrdersTable
      Events:
        SQSQueue:
          Type: SQS
          Properties:
            Queue: !GetAtt NotificationQueue.Arn
            BatchSize: 10
            FunctionResponseTypes:
              - ReportBatchItemFailures

  # ── CloudWatch Observability ──────────────────────────────
  AlarmTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub clouddelivery-alarms-${Env}

  DLQDepthAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub clouddelivery-dlq-depth-${Env}
      AlarmDescription: DLQ has messages — failed notifications need attention
      MetricName: ApproximateNumberOfMessagesVisible
      Namespace: AWS/SQS
      Statistic: Maximum
      Period: 60
      EvaluationPeriods: 1
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: QueueName
          Value: !GetAtt NotificationDLQ.QueueName
      AlarmActions:
        - !Ref AlarmTopic
      TreatMissingData: notBreaching

  KinesisOrderLagAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub clouddelivery-kinesis-order-lag-${Env}
      AlarmDescription: Order stream consumer lag > 10s
      MetricName: GetRecords.IteratorAgeMilliseconds
      Namespace: AWS/Kinesis
      Statistic: Maximum
      Period: 60
      EvaluationPeriods: 2
      Threshold: 10000
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: StreamName
          Value: !Ref OrderStream
      AlarmActions:
        - !Ref AlarmTopic
      TreatMissingData: notBreaching

  LambdaConcurrencyAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub clouddelivery-lambda-concurrency-${Env}
      AlarmDescription: Lambda concurrent executions > 500
      MetricName: ConcurrentExecutions
      Namespace: AWS/Lambda
      Statistic: Maximum
      Period: 60
      EvaluationPeriods: 1
      Threshold: 500
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref AlarmTopic
      TreatMissingData: notBreaching

  LambdaErrorsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub clouddelivery-lambda-errors-${Env}
      AlarmDescription: Lambda errors > 5 in 1 minute
      MetricName: Errors
      Namespace: AWS/Lambda
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 1
      Threshold: 5
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref AlarmTopic
      TreatMissingData: notBreaching

  DynamoDBThrottleAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub clouddelivery-dynamo-throttle-${Env}
      AlarmDescription: DynamoDB throttled requests > 0
      MetricName: ThrottledRequests
      Namespace: AWS/DynamoDB
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 1
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: TableName
          Value: !Ref OrdersTable
      AlarmActions:
        - !Ref AlarmTopic
      TreatMissingData: notBreaching

  CloudDeliveryDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Sub CloudDelivery-${Env}
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "metric",
              "x": 0, "y": 0, "width": 12, "height": 6,
              "properties": {
                "title": "Matching Latency (ms)",
                "region": "us-east-1",
                "metrics": [
                  ["CloudDelivery/${Env}", "matching.duration_ms", {"stat": "p50", "label": "p50"}],
                  ["CloudDelivery/${Env}", "matching.duration_ms", {"stat": "p95", "label": "p95"}],
                  ["CloudDelivery/${Env}", "matching.duration_ms", {"stat": "p99", "label": "p99"}]
                ],
                "period": 60,
                "view": "timeSeries",
                "annotations": {
                  "horizontal": [{"value": 1000, "label": "p99 SLA (1000ms)", "color": "#ff0000"}]
                }
              }
            },
            {
              "type": "metric",
              "x": 12, "y": 0, "width": 12, "height": 6,
              "properties": {
                "title": "Assignment Results",
                "region": "us-east-1",
                "metrics": [
                  ["CloudDelivery/${Env}", "matching.assignment_result", "Result", "success", {"stat": "Sum", "label": "Success"}],
                  ["CloudDelivery/${Env}", "matching.assignment_result", "Result", "no_courier", {"stat": "Sum", "label": "No Courier"}],
                  ["CloudDelivery/${Env}", "matching.assignment_result", "Result", "conflict", {"stat": "Sum", "label": "Conflict (retry)"}]
                ],
                "period": 60,
                "view": "timeSeries"
              }
            },
            {
              "type": "metric",
              "x": 0, "y": 6, "width": 12, "height": 6,
              "properties": {
                "title": "Lambda Concurrent Executions",
                "region": "us-east-1",
                "metrics": [
                  ["AWS/Lambda", "ConcurrentExecutions", {"stat": "Maximum", "label": "All Lambdas"}],
                  ["AWS/Lambda", "ConcurrentExecutions", "FunctionName", "clouddelivery-matching-${Env}", {"stat": "Maximum", "label": "MatchingLambda"}]
                ],
                "period": 60,
                "view": "timeSeries",
                "annotations": {
                  "horizontal": [{"value": 500, "label": "Alert threshold", "color": "#ff0000"}]
                }
              }
            },
            {
              "type": "metric",
              "x": 12, "y": 6, "width": 12, "height": 6,
              "properties": {
                "title": "Lambda Errors & Cold Starts",
                "region": "us-east-1",
                "metrics": [
                  ["AWS/Lambda", "Errors", {"stat": "Sum", "label": "Errors (all)"}],
                  ["AWS/Lambda", "InitDuration", {"stat": "SampleCount", "label": "Cold Starts (count)"}]
                ],
                "period": 60,
                "view": "timeSeries"
              }
            },
            {
              "type": "metric",
              "x": 0, "y": 12, "width": 12, "height": 6,
              "properties": {
                "title": "Kinesis Consumer Lag (ms)",
                "region": "us-east-1",
                "metrics": [
                  ["AWS/Kinesis", "GetRecords.IteratorAgeMilliseconds", "StreamName", "clouddelivery-orders-${Env}", {"stat": "Maximum", "label": "Orders stream"}],
                  ["AWS/Kinesis", "GetRecords.IteratorAgeMilliseconds", "StreamName", "clouddelivery-locations-${Env}", {"stat": "Maximum", "label": "Locations stream"}]
                ],
                "period": 60,
                "view": "timeSeries",
                "annotations": {
                  "horizontal": [{"value": 10000, "label": "Alert threshold (10s)", "color": "#ff0000"}]
                }
              }
            },
            {
              "type": "metric",
              "x": 12, "y": 12, "width": 12, "height": 6,
              "properties": {
                "title": "DynamoDB Throttled Requests",
                "region": "us-east-1",
                "metrics": [
                  ["AWS/DynamoDB", "ThrottledRequests", "TableName", "clouddelivery-${Env}", {"stat": "Sum", "label": "Throttled"}]
                ],
                "period": 60,
                "view": "timeSeries",
                "annotations": {
                  "horizontal": [{"value": 0, "label": "Any throttle = alert", "color": "#ff0000"}]
                }
              }
            },
            {
              "type": "metric",
              "x": 0, "y": 18, "width": 12, "height": 6,
              "properties": {
                "title": "DLQ Depth",
                "region": "us-east-1",
                "metrics": [
                  ["AWS/SQS", "ApproximateNumberOfMessagesVisible", "QueueName", "clouddelivery-notifications-dlq-${Env}", {"stat": "Maximum", "label": "DLQ messages"}]
                ],
                "period": 60,
                "view": "timeSeries",
                "annotations": {
                  "horizontal": [{"value": 0, "label": "Any DLQ message = alert", "color": "#ff0000"}]
                }
              }
            },
            {
              "type": "metric",
              "x": 12, "y": 18, "width": 12, "height": 6,
              "properties": {
                "title": "Couriers in Geo-Index & Radius",
                "region": "us-east-1",
                "metrics": [
                  ["CloudDelivery/${Env}", "location.active_couriers", {"stat": "Maximum", "label": "Active couriers"}],
                  ["CloudDelivery/${Env}", "matching.couriers_in_radius", {"stat": "Average", "label": "Avg couriers in radius"}]
                ],
                "period": 60,
                "view": "timeSeries"
              }
            }
          ]
        }

Outputs:
  ApiEndpoint:
    Description: API Gateway endpoint URL
    Value: !Sub https://${CloudDeliveryAPI}.execute-api.us-east-1.amazonaws.com/${Env}

  OrdersTableName:
    Description: DynamoDB table name
    Value: !Ref OrdersTable

  OrderStreamName:
    Description: Kinesis order stream name
    Value: !Ref OrderStream

  LocationStreamName:
    Description: Kinesis location stream name
    Value: !Ref LocationStream

  MatchTopicArn:
    Description: SNS match notifications topic ARN
    Value: !Ref MatchTopic

  NotificationQueueUrl:
    Description: SQS notification queue URL
    Value: !Ref NotificationQueue

  NotificationDLQUrl:
    Description: SQS dead letter queue URL
    Value: !Ref NotificationDLQ

  CognitoUserPoolId:
    Description: Cognito User Pool ID
    Value: !Ref CognitoUserPool

  CognitoClientId:
    Description: Cognito App Client ID
    Value: !Ref CognitoUserPoolClient

  AlarmTopicArn:
    Description: SNS topic ARN for CloudWatch alarms
    Value: !Ref AlarmTopic

  DashboardUrl:
    Description: CloudWatch dashboard URL
    Value: !Sub https://us-east-1.console.aws.amazon.com/cloudwatch/home?region=us-east-1#dashboards:name=CloudDelivery-${Env}
